<body class="bg-gray-50">
<div id="app"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, get, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: 'AIzaSyC99haugmxISL8XP_GpLLDZSUyBoVYeK-c',
  authDomain: 'study-evaluation-c9935.firebaseapp.com',
  projectId: 'study-evaluation-c9935',
  storageBucket: 'study-evaluation-c9935.firebasestorage.app',
  messagingSenderId: '499525296840',
  appId: '1:499525296840:web:012a77c03dff677ef47bfd',
  databaseURL: 'https://study-evaluation-c9935-default-rtdb.asia-southeast1.firebasedatabase.app'
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const dbGet = async (path) => { const s = await get(ref(db, path)); return s.exists() ? s.val() : null; };
const dbSet = (path, val) => set(ref(db, path), val);
const dbUpd = (path, val) => update(ref(db, path), val);

// ── 상수 ──────────────────────────────────────────────────────────────────────
const ADMIN = { name: '오상진', password: '700717' };
const PRES_MAX = 10;

const STUDENTS_INIT = [
  { id: 'st01', name: '최지희', student_number: '20261156' },
  { id: 'st02', name: '장한결', student_number: '20261155' },
  { id: 'st03', name: '장경민', student_number: '20261154' },
  { id: 'st04', name: '이호진', student_number: '20261153' },
  { id: 'st05', name: '이지원', student_number: '20261152' },
  { id: 'st06', name: '이재영', student_number: '20261120' },
  { id: 'st07', name: '유재민', student_number: '20261151' },
  { id: 'st08', name: '나용범', student_number: '20261149' },
  { id: 'st09', name: '김동준', student_number: '20261148' },
  { id: 'st10', name: '김규학', student_number: '20261147' },
  { id: 'st11', name: '김강현', student_number: '20205010' },
  { id: 'st12', name: '곽진화', student_number: '20261146' },
  { id: 'st13', name: '강시온', student_number: '20261145' },
  { id: 'st14', name: 'Muza',   student_number: '20225229' },
];

// ── 상태 ──────────────────────────────────────────────────────────────────────
let S = {
  view: 'login',       // login | changePw | eval | admin
  user: null,          // { role, id, name }
  students: {},        // id → { name, student_number, password, password_changed, participation_max, submission_count }
  evals: {},           // evaluatorId → targetId → { presentation_score, participation_score, submitted_at }
  scores: {},          // 로컬 평가 입력: targetId → { p, r }
  adminTab: 'students',
  modal: null,         // { type:'received'|'given', sid }
  error: '',
};

// ── 데이터 헬퍼 ───────────────────────────────────────────────────────────────
const studentsArr = () => STUDENTS_INIT.map(s => ({ ...s, ...S.students[s.id] }));
const studentById = id => studentsArr().find(s => s.id === id);
const othersOf = myId => studentsArr().filter(s => s.id !== myId);

const presSum = () => Object.values(S.scores).reduce((a, v) => a + (v.p || 0), 0);
const partSum = () => Object.values(S.scores).reduce((a, v) => a + (v.r || 0), 0);

function receivedBy(targetId) {
  return Object.entries(S.evals).flatMap(([eid, targets]) =>
    targets[targetId]
      ? [{ evaluatorId: eid, evaluatorName: S.students[eid]?.name || eid, ...targets[targetId] }]
      : []
  );
}

function givenBy(evalId) {
  return Object.entries(S.evals[evalId] || {}).map(([tid, v]) => ({
    targetId: tid, targetName: S.students[tid]?.name || tid, ...v
  }));
}

function totalReceived(sid) {
  const r = receivedBy(sid);
  const pres = r.reduce((a, x) => a + (x.presentation_score || 0), 0);
  const part = r.reduce((a, x) => a + (x.participation_score || 0), 0);
  return { pres, part, total: pres + part };
}

// ── Firebase 초기화 ────────────────────────────────────────────────────────────
async function initDB() {
  const existing = await dbGet('students');
  if (!existing) {
    const obj = {};
    for (const s of STUDENTS_INIT) {
      obj[s.id] = {
        name: s.name, student_number: s.student_number,
        password: s.student_number, password_changed: false,
        participation_max: 0, submission_count: 0
      };
    }
    await dbSet('students', obj);
  }
}

async function loadData() {
  const [students, evals] = await Promise.all([dbGet('students'), dbGet('evaluations')]);
  S.students = students || {};
  S.evals = evals || {};
}

// ── 인증 ──────────────────────────────────────────────────────────────────────
async function login(name, pw) {
  S.error = '';
  if (name === ADMIN.name) {
    if (pw !== ADMIN.password) { S.error = '관리자 비밀번호가 올바르지 않습니다.'; render(); return; }
    S.user = { role: 'admin', id: 'admin', name };
    S.view = 'admin'; render(); return;
  }
  const st = studentsArr().find(s => s.name === name);
  if (!st) { S.error = '이름을 찾을 수 없습니다.'; render(); return; }
  if (st.password !== pw) { S.error = '패스워드가 올바르지 않습니다.'; render(); return; }
  S.user = { role: 'student', id: st.id, name: st.name };
  if (!st.password_changed) { S.view = 'changePw'; }
  else { S.view = 'eval'; initScores(); }
  render();
}

async function changePw(newPw) {
  const id = S.user.id;
  await dbUpd(`students/${id}`, { password: newPw, password_changed: true });
  S.students[id] = { ...S.students[id], password: newPw, password_changed: true };
  S.view = 'eval'; initScores(); render();
}

function logout() {
  S = { ...S, view: 'login', user: null, scores: {}, modal: null, error: '' };
  render();
}

// ── 평가 ──────────────────────────────────────────────────────────────────────
function initScores() {
  const existing = S.evals[S.user.id] || {};
  S.scores = {};
  for (const st of othersOf(S.user.id)) {
    S.scores[st.id] = {
      p: existing[st.id]?.presentation_score ?? 0,
      r: existing[st.id]?.participation_score ?? 0,
    };
  }
}

async function submitEval(isResub) {
  const uid = S.user.id;
  const cnt = S.students[uid]?.submission_count || 0;
  if (!isResub && cnt >= 1) return;
  if (isResub && cnt >= 2) return;
  const now = new Date().toISOString();
  const data = {};
  for (const [tid, v] of Object.entries(S.scores)) {
    data[tid] = { presentation_score: v.p, participation_score: v.r, submitted_at: now };
  }
  await dbSet(`evaluations/${uid}`, data);
  await dbUpd(`students/${uid}`, { submission_count: cnt + 1 });
  S.evals[uid] = data;
  S.students[uid].submission_count = cnt + 1;
  render();
}

// ── 관리자 ────────────────────────────────────────────────────────────────────
async function resetPw(sid) {
  const sn = S.students[sid].student_number;
  await dbUpd(`students/${sid}`, { password: sn, password_changed: false });
  S.students[sid] = { ...S.students[sid], password: sn, password_changed: false };
  render();
}

async function resetAllData() {
  const updates = {};
  for (const s of STUDENTS_INIT) {
    updates[`students/${s.id}/submission_count`] = 0;
  }
  await dbUpd('/', updates);
  await dbSet('evaluations', null);
  S.evals = {};
  for (const s of STUDENTS_INIT) {
    if (S.students[s.id]) S.students[s.id].submission_count = 0;
  }
  render();
}

async function savePartScores() {
  const updates = {};
  document.querySelectorAll('.part-input').forEach(inp => {
    const sid = inp.dataset.sid;
    const val = Math.min(8, Math.max(0, parseInt(inp.value) || 0));
    updates[`students/${sid}/participation_max`] = val;
    S.students[sid].participation_max = val;
  });
  await dbUpd('/', updates);
  alert('참여 점수가 저장되었습니다.');
  render();
}

function downloadCSV() {
  const rows = [['이름', '기말발표 합계', '참여점수 합계', '최종점수', '제출여부']];
  for (const s of studentsArr()) {
    const { pres, part, total } = totalReceived(s.id);
    const sub = (S.students[s.id]?.submission_count || 0) >= 1 ? '완료' : '미완료';
    rows.push([s.name, pres, part, total, sub]);
  }
  const csv = '﻿' + rows.map(r => r.join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' })),
    download: '기말평가결과.csv'
  });
  a.click();
}

// ── UI 헬퍼 ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const appEl = () => document.getElementById('app');

function scoreColor(cur, target) {
  if (cur === target) return 'text-green-600 font-bold'; // 정확히 일치: 초록
  if (cur > target)   return 'text-red-600 font-bold';   // 초과: 빨간
  return 'text-orange-500 font-bold';                    // 부족: 주황
}

function badge(ok, labelOk, labelNo) {
  return ok
    ? `<span class="px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-700">${labelOk}</span>`
    : `<span class="px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-500">${labelNo}</span>`;
}

// ── 렌더: 로그인 ──────────────────────────────────────────────────────────────
function renderLogin() {
  const opts = [ADMIN.name, ...STUDENTS_INIT.map(s => s.name)]
    .map(n => `<option value="${n}">${n}</option>`).join('');

  // 인라인 스타일로 구성 — Tailwind CDN 로딩 여부와 무관하게 동작 보장
  appEl().innerHTML = `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f9fafb;padding:1rem;">
    <div style="background:#fff;border-radius:1.25rem;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:2rem;width:100%;max-width:360px;">
      <div style="text-align:center;margin-bottom:1.75rem;">
        <div style="font-size:3rem;line-height:1;margin-bottom:0.5rem;">📋</div>
        <h1 style="font-size:1.35rem;font-weight:700;color:#1f2937;margin:0 0 0.25rem;">기말평가 상호평가 시스템</h1>
        <p style="font-size:0.8rem;color:#9ca3af;margin:0;">2026학년도</p>
      </div>

      <div style="margin-bottom:1rem;">
        <label for="l-name" style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.35rem;">이름</label>
        <select id="l-name"
          style="display:block;width:100%;border:1px solid #d1d5db;border-radius:0.5rem;padding:0.55rem 0.75rem;font-size:0.9rem;background:#fff;cursor:pointer;outline:none;">
          ${opts}
        </select>
      </div>

      <div style="margin-bottom:1.25rem;">
        <label for="l-pw" style="display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.35rem;">패스워드</label>
        <input id="l-pw" type="password" autocomplete="current-password" placeholder="패스워드를 입력하세요"
          style="display:block;width:100%;border:1px solid #d1d5db;border-radius:0.5rem;padding:0.55rem 0.75rem;font-size:0.9rem;outline:none;cursor:text;" />
      </div>

      <div id="login-err" style="display:none;color:#ef4444;font-size:0.8rem;background:#fef2f2;border-radius:0.5rem;padding:0.5rem 0.75rem;margin-bottom:0.75rem;"></div>

      <button id="btn-login" type="button"
        style="display:block;width:100%;background:#2563eb;color:#fff;font-weight:600;padding:0.65rem;border:none;border-radius:0.5rem;font-size:0.95rem;cursor:pointer;">
        로그인
      </button>
    </div>
  </div>`;

  if (S.error) {
    const el = $('login-err');
    el.textContent = S.error;
    el.style.display = 'block';
  }

  $('btn-login').addEventListener('click', () =>
    login($('l-name').value, $('l-pw').value)

  $('l-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btn-login').click();
  });
  // 이름 변경 시 패스워드 필드로 자동 포커스
  $('l-name').addEventListener('change', () => $('l-pw').focus());

// ── 렌더: 패스워드 변경 ───────────────────────────────────────────────────────
function renderChangePw() {
  const inp = 'display:block;width:100%;border:1px solid #d1d5db;border-radius:0.5rem;padding:0.55rem 0.75rem;font-size:0.9rem;outline:none;box-sizing:border-box;';
  const lbl = 'display:block;font-size:0.875rem;font-weight:500;color:#374151;margin-bottom:0.35rem;';
  appEl().innerHTML = `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f9fafb;padding:1rem;">
    <div style="background:#fff;border-radius:1.25rem;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:2rem;width:100%;max-width:360px;">
      <div style="text-align:center;margin-bottom:1.75rem;">
        <div style="font-size:2.5rem;line-height:1;margin-bottom:0.5rem;">🔑</div>
        <h2 style="font-size:1.25rem;font-weight:700;color:#1f2937;margin:0 0 0.25rem;">패스워드 변경</h2>
        <p style="font-size:0.8rem;color:#9ca3af;margin:0;">최초 로그인입니다. 새 패스워드를 설정해주세요.</p>
      </div>
      <div style="margin-bottom:1rem;">
        <label for="pw1" style="${lbl}">새 패스워드</label>
        <input id="pw1" type="password" maxlength="8" placeholder="8자리 이하 영문·숫자" style="${inp}" autocomplete="new-password" />
      </div>
      <div style="margin-bottom:1rem;">
        <label for="pw2" style="${lbl}">패스워드 확인</label>
        <input id="pw2" type="password" maxlength="8" placeholder="패스워드 재입력" style="${inp}" autocomplete="new-password" />
      </div>
      <div id="pw-err" style="display:none;color:#ef4444;font-size:0.8rem;background:#fef2f2;border-radius:0.5rem;padding:0.5rem 0.75rem;margin-bottom:0.75rem;"></div>
      <button id="btn-cpw" type="button"
        style="display:block;width:100%;background:#2563eb;color:#fff;font-weight:600;padding:0.65rem;border:none;border-radius:0.5rem;font-size:0.95rem;cursor:pointer;">
        변경 후 평가 시작
      </button>
    </div>
  </div>`;
  $('btn-cpw').onclick = () => {
    const p1 = $('pw1').value.trim(), p2 = $('pw2').value.trim();
    const errEl = $('pw-err');
    const showErr = msg => { errEl.textContent = msg; errEl.style.display = 'block'; };
    if (!p1) { showErr('패스워드를 입력해주세요.'); return; }
    if (!/^[a-zA-Z0-9]{1,8}$/.test(p1)) { showErr('영문·숫자 8자리 이하로 입력해주세요.'); return; }
    if (p1 !== p2) { showErr('패스워드가 일치하지 않습니다.'); return; }
    errEl.style.display = 'none';
    changePw(p1);
  };
  $('pw1').addEventListener('keydown', e => { if (e.key === 'Enter') $('pw2').focus(); });
  $('pw2').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-cpw').click(); });
}

// ── 렌더: 학생 평가 화면 ──────────────────────────────────────────────────────
function renderEval() {
  const uid = S.user.id;
  const me = studentById(uid);
  const others = othersOf(uid);
  const subCnt = S.students[uid]?.submission_count || 0;
  const isFinished = subCnt >= 2;
  const isSubmitted = subCnt >= 1;
  const partMax = S.students[uid]?.participation_max || 0;
  const pSum = presSum(), rSum = partSum();
  const presOk = pSum === PRES_MAX, partOk = rSum === partMax;
  const canSubmit = presOk && partOk && !isFinished;

  const presW = Math.min(100, (pSum / PRES_MAX) * 100);
  const partW = partMax > 0 ? Math.min(100, (rSum / partMax) * 100) : (rSum === 0 ? 100 : 0);

  const statusBanner = isFinished
    ? `<div class="mt-3 bg-gray-100 rounded-lg px-4 py-2 text-center text-sm text-gray-500">✅ 평가 최종 완료. 더 이상 수정이 불가합니다.</div>`
    : isSubmitted
      ? `<div class="mt-3 bg-yellow-50 border border-yellow-200 rounded-lg px-4 py-2 text-center text-sm text-yellow-700">⚠️ 1차 제출 완료. 1회에 한해 재제출 가능합니다.</div>`
      : '';

  const cards = others.map(st => {
    const sv = S.scores[st.id] || { p: 0, r: 0 };
    const dis = isFinished ? 'disabled' : '';
    return `
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 hover:border-blue-200 transition">
      <p class="font-semibold text-gray-800 mb-3 text-center">${st.name}</p>
      <div class="space-y-2">
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400 w-16 shrink-0">기말발표</span>
          <input type="number" min="0" max="3" value="${sv.p}"
            class="score-inp w-14 text-center border border-gray-200 rounded-lg py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 ${isFinished ? 'bg-gray-50 text-gray-400' : ''}"
            data-sid="${st.id}" data-type="p" ${dis} />
          <span class="text-xs text-gray-300">/ 3점</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400 w-16 shrink-0">참여</span>
          <input type="number" min="0" max="3" value="${sv.r}"
            class="score-inp w-14 text-center border border-gray-200 rounded-lg py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 ${isFinished ? 'bg-gray-50 text-gray-400' : ''}"
            data-sid="${st.id}" data-type="r" ${dis} />
          <span class="text-xs text-gray-300">/ 3점</span>
        </div>
      </div>
    </div>`;
  }).join('');

  const submitArea = isFinished ? '' : `
  <div class="mt-6 flex justify-center">
    <button id="btn-submit"
      class="px-10 py-3 rounded-xl font-semibold text-white transition ${canSubmit ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-300 cursor-not-allowed'}"
      ${canSubmit ? '' : 'disabled'}>
      ${isSubmitted ? '재제출하기' : '최종 제출'}
    </button>
  </div>`;

  appEl().innerHTML = `
  <div class="max-w-3xl mx-auto py-6 px-4">
    <div class="bg-white rounded-xl shadow-sm px-5 py-4 mb-4 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-bold text-gray-800">📋 기말평가 상호평가</h1>
        <p class="text-sm text-gray-400">${S.user.name} 님 | 본인 제외 ${others.length}명 평가</p>
      </div>
      <button onclick="logout()" class="text-sm text-gray-400 hover:text-red-500 transition">로그아웃</button>
    </div>

    <div class="bg-white rounded-xl shadow-sm px-5 py-4 mb-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs text-gray-500">기말발표 점수 배분</span>
            <span id="pres-label" class="${scoreColor(pSum, PRES_MAX)} text-sm">${pSum} / ${PRES_MAX}</span>
          </div>
          <div class="bg-gray-100 rounded-full h-2">
            <div id="pres-bar" class="h-2 rounded-full ${pSum > PRES_MAX ? 'bg-red-500' : 'bg-blue-500'} transition-all" style="width:${presW}%"></div>
          </div>
          <p class="text-xs text-gray-400 mt-1">${PRES_MAX}점 전액 배분 필수</p>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs text-gray-500">참여 점수 배분</span>
            <span id="part-label" class="${scoreColor(rSum, partMax)} text-sm">${rSum} / ${partMax}</span>
          </div>
          <div class="bg-gray-100 rounded-full h-2">
            <div id="part-bar" class="h-2 rounded-full ${rSum > partMax ? 'bg-red-500' : 'bg-green-500'} transition-all" style="width:${partW}%"></div>
          </div>
          <p class="text-xs text-gray-400 mt-1">${partMax}점 전액 배분 필수</p>
        </div>
      </div>
      ${statusBanner}
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
      ${cards}
    </div>
    ${submitArea}
  </div>`;

  // 점수 입력 이벤트 (타겟 DOM 업데이트)
  document.querySelectorAll('.score-inp').forEach(inp => {
    inp.oninput = () => {
      const sid = inp.dataset.sid, type = inp.dataset.type;
      let val = parseInt(inp.value) || 0;
      val = Math.min(3, Math.max(0, val));
      inp.value = val;
      if (!S.scores[sid]) S.scores[sid] = { p: 0, r: 0 };
      S.scores[sid][type] = val;
      refreshScoreTotals();
    };
  });

  // onclick 으로만 관리 — addEventListener 와 중복 등록 시 모달이 2회 생성되어 버튼 미반응 발생
  const btnSubmit = $('btn-submit');
  if (btnSubmit) {
    btnSubmit.onclick = canSubmit ? () => showSubmitModal(isSubmitted) : null;
  }
}

function refreshScoreTotals() {
  const uid = S.user.id;
  const partMax = S.students[uid]?.participation_max || 0;
  const pSum = presSum(), rSum = partSum();
  const presOk = pSum === PRES_MAX, partOk = rSum === partMax;
  const subCnt2 = S.students[uid]?.submission_count || 0;
  const isSubmitted = subCnt2 >= 1;
  const canSubmit = presOk && partOk && subCnt2 < 2;

  const presW = Math.min(100, (pSum / PRES_MAX) * 100);
  const partW = partMax > 0 ? Math.min(100, (rSum / partMax) * 100) : (rSum === 0 ? 100 : 0);

  const pl = $('pres-label'), pb = $('pres-bar');
  const rl = $('part-label'), rb = $('part-bar');
  const btn = $('btn-submit');

  if (pl) { pl.textContent = `${pSum} / ${PRES_MAX}`; pl.className = `text-sm ${scoreColor(pSum, PRES_MAX)}`; }
  if (pb) { pb.style.width = `${presW}%`; pb.className = `h-2 rounded-full ${pSum > PRES_MAX ? 'bg-red-500' : 'bg-blue-500'} transition-all`; }
  if (rl) { rl.textContent = `${rSum} / ${partMax}`; rl.className = `text-sm ${scoreColor(rSum, partMax)}`; }
  if (rb) { rb.style.width = `${partW}%`; rb.className = `h-2 rounded-full ${rSum > partMax ? 'bg-red-500' : 'bg-green-500'} transition-all`; }
  if (btn) {
    btn.disabled = !canSubmit;
    btn.className = `px-10 py-3 rounded-xl font-semibold text-white transition ${canSubmit ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-300 cursor-not-allowed'}`;
    btn.textContent = isSubmitted ? '재제출하기' : '최종 제출';
    // Re-bind click since we don't re-render
    btn.onclick = canSubmit ? () => showSubmitModal(isSubmitted) : null;
  }
}

  document.getElementById('submit-modal')?.remove();
  const uid = S.user.id;

  overlay.id = 'submit-modal';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem;';

  const card = document.createElement('div');
  card.style.cssText = 'background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:1.5rem;max-width:360px;width:100%;';

  const title = document.createElement('h3');
  title.style.cssText = 'font-size:1.1rem;font-weight:700;color:#1f2937;margin:0 0 0.5rem;';
  title.textContent = (isResub ? '재제출' : '최종 제출') + ' 확인';

  const msg = document.createElement('p');
  msg.style.cssText = 'font-size:0.875rem;color:#4b5563;margin:0 0 1rem;line-height:1.5;';

    ? '재제출 시 이전 평가가 덮어씌워집니다. 재제출은 1회만 가능하며 이후 수정 불가합니다.'
    : '제출 후 1회에 한해 재제출이 가능합니다. 계속하시겠습니까?';

  const summary = document.createElement('div');
  summary.style.cssText = 'background:#f9fafb;border-radius:8px;padding:0.75rem;margin-bottom:1rem;font-size:0.875rem;';
  summary.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:0.25rem;">
      <span style="color:#6b7280;">기말발표 점수 배분</span>
      <span style="font-weight:600;">${pSum}점 (한도 ${PRES_MAX}점)</span>
    </div>
    <div style="display:flex;justify-content:space-between;">
      <span style="color:#6b7280;">참여 점수 배분</span>
      <span style="font-weight:600;">${rSum}점 (한도 ${partMax}점)</span>
    </div>`;

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:0.75rem;';

  const btnCancel = document.createElement('button');
  btnCancel.style.cssText = 'flex:1;padding:0.6rem 0;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#374151;font-size:0.875rem;cursor:pointer;';
  btnCancel.textContent = '취소';
  btnCancel.onclick = () => overlay.remove();

  const btnOk = document.createElement('button');
  btnOk.style.cssText = 'flex:1;padding:0.6rem 0;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:0.875rem;font-weight:600;cursor:pointer;';
  btnOk.textContent = isResub ? '재제출' : '제출';
  btnOk.onclick = () => { overlay.remove(); submitEval(isResub); };

  btnRow.appendChild(btnCancel);
  btnRow.appendChild(btnOk);
  card.appendChild(title);
  card.appendChild(msg);
  card.appendChild(summary);
  card.appendChild(btnRow);
  overlay.appendChild(card);
  document.body.appendChild(overlay);
}

function renderAdmin() {

      </tr></thead><tbody>${rows}</tbody>
    </table>`;
  } else {
    const list = givenBy(sid);
    const rows = list.length
      ? list.map(g => `<tr style="border-top:1px solid #f9fafb;">
          <td style="padding:0.5rem 1rem;">${g.targetName}</td>
          <td style="padding:0.5rem 1rem;text-align:center;">${g.presentation_score}</td>
          <td style="padding:0.5rem 1rem;text-align:center;">${g.participation_score}</td>
        </tr>`).join('')
      : `<tr><td colspan="3" style="padding:1rem;text-align:center;color:#9ca3af;font-size:0.875rem;">제출한 평가가 없습니다</td></tr>`;
    card.innerHTML = `
    <h3 style="font-weight:700;color:#1f2937;margin:0 0 0.25rem;">${student?.name} — 부여한 점수 상세</h3>
    <p style="font-size:0.75rem;color:#9ca3af;margin:0 0 0.75rem;">13명에게 부여한 점수 내역</p>
    <table style="width:100%;font-size:0.875rem;border-collapse:collapse;">
      <thead><tr style="background:#f9fafb;color:#6b7280;font-size:0.75rem;">
        <th style="padding:0.5rem 1rem;text-align:left;">피평가자</th>
        <th style="padding:0.5rem 1rem;text-align:center;">기말발표</th>
        <th style="padding:0.5rem 1rem;text-align:center;">참여점수</th>
      </tr></thead><tbody>${rows}</tbody>
    </table>`;
  }

  const btnClose = document.createElement('button');
  btnClose.style.cssText = 'margin-top:1rem;width:100%;padding:0.5rem;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#6b7280;font-size:0.875rem;cursor:pointer;';
  btnClose.textContent = '닫기';
  btnClose.onclick = () => { overlay.remove(); S.modal = null; };

  card.appendChild(btnClose);
  overlay.appendChild(card);
  overlay.onclick = e => { if (e.target === overlay) { overlay.remove(); S.modal = null; } };
  document.body.appendChild(overlay);
}

// ── 메인 렌더 ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('admin-modal')?.remove();
  document.getElementById('submit-modal')?.remove();
  switch (S.view) {
    case 'login':    renderLogin(); break;
    case 'changePw': renderChangePw(); break;
    case 'eval':     renderEval(); break;
    case 'admin':    renderAdmin(); break;
  }
}

window.logout = logout;

// ── 부트 ─────────────────────────────────────────────────────────────────────
async function boot() {
  appEl().innerHTML = `<div class="min-h-screen flex items-center justify-center"><p class="text-gray-400 text-sm">로딩 중...</p></div>`;
  try {
    await initDB();
    await loadData();
  } catch (e) {
    appEl().innerHTML = `<div class="min-h-screen flex items-center justify-center">
      <p class="text-red-500">Firebase 연결 실패: ${e.message}</p></div>`;
    return;
  }
  render();
}

boot();
</script>
</body>
</html>
